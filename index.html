<script>
const DATA_SOURCES = {
  asetukset: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=66064090&single=true&output=csv",

  ruokailut: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=1535982202&single=true&output=csv",
  ottelut: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=206681168&single=true&output=csv",
  talkoot: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=621423242&single=true&output=csv",
  kyydit: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=473439237&single=true&output=csv",
  saatavuus: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=212948974&single=true&output=csv",
  osoitteet: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=518675820&single=true&output=csv",
  yhteystiedot: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=1844830324&single=true&output=csv",
  info: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSkSWXcPwy_8QzG9pZ0O-JjAQhsVY78Y3riBq5ZaolahL5Xg1fs1KhOqE0irbdMvqd_4NACON1i0ZQ/pub?gid=1790598112&single=true&output=csv",};

let DATA = {};
let SETTINGS = {};
let PLACES = {};
let DAYS = [];
let selectedTab = null;
let weatherData = null;
let loadErrors = [];
let weatherError = "";

const INFO_TAB_IDS = {
  talkoot: "talkoot",
  kyydit: "kyydit",
  ruoka: "ruoka",
  osoitteet: "osoitteet",
  yhteystiedot: "yhteystiedot",
  info: "info",
  saa: "saa"
};
const WD = ["Su", "Ma", "Ti", "Ke", "To", "Pe", "La"];
const WMO = {
  0:["☀️","Selkeää"], 1:["🌤️","Enimmäkseen selkeää"], 2:["⛅","Puolipilvistä"], 3:["☁️","Pilvistä"],
  45:["🌫️","Sumua"], 48:["🌫️","Sumua"],
  51:["🌦️","Tihkusadetta"], 53:["🌦️","Tihkusadetta"], 55:["🌦️","Tihkusadetta"],
  56:["🌧️","Jäätävää tihkua"], 57:["🌧️","Jäätävää tihkua"],
  61:["🌧️","Heikkoa sadetta"], 63:["🌧️","Sadetta"], 65:["🌧️","Voimakasta sadetta"],
  66:["🌧️","Jäätävää sadetta"], 67:["🌧️","Jäätävää sadetta"],
  71:["❄️","Lumisadetta"], 73:["❄️","Lumisadetta"], 75:["❄️","Lumisadetta"], 77:["❄️","Lumijyväsiä"],
  80:["🌦️","Sadekuuroja"], 81:["🌦️","Sadekuuroja"], 82:["🌧️","Voimakkaita kuuroja"],
  85:["🌨️","Lumikuuroja"], 86:["🌨️","Lumikuuroja"],
  95:["⛈️","Ukkosta"], 96:["⛈️","Ukkosta ja rakeita"], 99:["⛈️","Ukkosta ja rakeita"]
};

function parseCsv(text) {
  text = text.replace(/^\uFEFF/, "");
  const rows = [];
  let row = [], cell = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQuotes) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cell += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else if (c !== '\r') cell += c;
    }
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows.shift().map(h => normalizeKey(h));
  return rows
    .filter(r => r.some(v => String(v || "").trim() !== ""))
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = String(r[i] || "").trim());
      return obj;
    });
}

function normalizeKey(s) {
  return String(s || "").trim().toLowerCase()
    .replace(/ä/g,"a").replace(/ö/g,"o").replace(/å/g,"a")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
}
function isTrue(v) { return String(v || "").trim().toLowerCase() !== "false" && String(v || "").trim() !== "0"; }
function visibleRows(rows) { return (rows || []).filter(r => isTrue(r.visible)); }
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function pick(obj, keys, fallback="") { for (const k of keys) if (obj && obj[k] !== undefined && obj[k] !== "") return obj[k]; return fallback; }
function parseNumberFi(v, fallback) {
  const n = Number(String(v ?? "").trim().replace(",", "."));
  return Number.isFinite(n) ? n : fallback;
}

async function loadCsv(name, url) {
  const bust = url.includes("?") ? "&cachebust=" : "?cachebust=";
  const res = await fetch(url + bust + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(name + ": HTTP " + res.status);
  return parseCsv(await res.text());
}

async function loadAllData() {
  const entries = Object.entries(DATA_SOURCES);
  const out = {};
  loadErrors = [];
  await Promise.all(entries.map(async ([name, url]) => {
    try { out[name] = await loadCsv(name, url); }
    catch (err) { out[name] = []; loadErrors.push(err.message); }
  }));
  return out;
}

function buildSettings() {
  SETTINGS = {};
  for (const r of DATA.asetukset || []) {
    const k = pick(r, ["key", "avain"]);
    const v = pick(r, ["value", "arvo"]);
    if (k) SETTINGS[k] = v;
  }
  document.title = SETTINGS.site_title || "Tenavaleiri 2026";
  document.getElementById("siteTitle").textContent = SETTINGS.site_title || "Tenavaleiri 2026";
  const team = [SETTINGS.team_name, SETTINGS.series].filter(Boolean).join(" · ");
  document.getElementById("teamLine").textContent = team || "Manse PP";
  document.getElementById("footerText").textContent = SETTINGS.footer || team || "Tenavaleiri 2026";
}

function buildPlaces() {
  PLACES = {};
  visibleRows(DATA.osoitteet).forEach(r => {
    const id = pick(r, ["place_id", "paikka_id", "id"]);
    if (id) PLACES[id] = r;
  });
}

function buildDays() {
  const dates = new Set();
  for (const r of visibleRows(DATA.ohjelma)) if (normDate(pick(r,["date","paivamaara"]))) dates.add(normDate(pick(r,["date","paivamaara"])));
  for (const r of visibleRows(DATA.ruokailut)) if (normDate(pick(r,["date","paivamaara"]))) dates.add(normDate(pick(r,["date","paivamaara"])));
  for (const r of visibleRows(DATA.ottelut)) { const p = parseDateTime(pick(r,["paivamaara","date"])); if (p.date) dates.add(p.date); }
  for (const r of visibleRows(DATA.kyydit)) if (normDate(pick(r,["date","paivamaara"]))) dates.add(normDate(pick(r,["date","paivamaara"])));
  if (!dates.size) ["2026-07-13","2026-07-14","2026-07-15","2026-07-16","2026-07-17","2026-07-18"].forEach(d => dates.add(d));
  DAYS = Array.from(dates).sort().map(date => {
    const d = new Date(date + "T12:00:00");
    return { key: date, label: WD[d.getDay()], dateLabel: `${d.getDate()}.${d.getMonth()+1}.` };
  });
}

function mapLink(label, query) {
  if (!query) return esc(label || "Paikka tarkentuu");
  const url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(query);
  return `<a class="maplink" href="${url}" target="_blank" rel="noopener">📍 ${esc(label)}</a>`;
}
function placeText(placeId, fallback="") {
  const p = PLACES[placeId];
  if (!p) return fallback ? esc(fallback) : "";
  const name = pick(p, ["name", "nimi"], placeId);
  const addr = pick(p, ["address", "osoite"]);
  const q = pick(p, ["maps_query", "karttahaku"], [name, addr].filter(Boolean).join(", "));
  const label = addr ? `${name} (${addr})` : name;
  return mapLink(label, q);
}
function placePlain(placeId) {
  const p = PLACES[placeId];
  if (!p) return "";
  return pick(p,["name","nimi"], placeId);
}

function normDate(v) {
  v = String(v || "").trim();
  if (!v) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m = v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return "";
}
function parseDateTime(v) {
  v = String(v || "").trim();
  let m = v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})\s+(\d{1,2}):(\d{2})/);
  if (m) return { date: `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`, time: `${m[4].padStart(2,"0")}:${m[5]}` };
  m = v.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{1,2}:\d{2})/);
  if (m) return { date: m[1], time: m[2].padStart(5,"0") };
  const d = normDate(v);
  return { date: d, time: "" };
}
function normalizeTime(v) {
  v = String(v || "").trim().replace(".", ":");
  const m = v.match(/(\d{1,2}):(\d{2})/);
  return m ? `${m[1].padStart(2,"0")}:${m[2]}` : "";
}
function endDefault(time, minutes=60) {
  const m = toMin(time); if (m === null) return "";
  const e = m + minutes;
  return `${String(Math.floor(e/60)%24).padStart(2,"0")}:${String(e%60).padStart(2,"0")}`;
}
function nowFi() { return new Date(new Date().toLocaleString("en-US", { timeZone: "Europe/Helsinki" })); }
function todayKey() {
  const n = nowFi();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;
}
function minutesNow() { const n = nowFi(); return n.getHours()*60 + n.getMinutes(); }
function toMin(hhmm) {
  if (!hhmm) return null;
  const m = String(hhmm).match(/^(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return Number(m[1])*60 + Number(m[2]);
}
function statusFor(date, time, endTime) {
  if (date !== todayKey()) return todayKey() > date ? "past" : "";
  const start = toMin(time); if (start === null) return "";
  const end = toMin(endTime) ?? start + 60;
  const now = minutesNow();
  if (now >= end) return "past";
  if (now >= start) return "current";
  return "future";
}
function getAutoDayIndex() {
  const tk = todayKey();
  const idx = DAYS.findIndex(d => d.key === tk);
  if (idx >= 0) return idx;
  return tk < (DAYS[0]?.key || tk) ? 0 : Math.max(0, DAYS.length - 1);
}
function getCurrentTab() { return selectedTab !== null ? selectedTab : getAutoDayIndex(); }
function colorClass(c, fallback="red") {
  c = String(c || fallback).toLowerCase();
  if (c.includes("green")) return "ic-green";
  if (c.includes("navy")) return "ic-navy";
  if (c.includes("blue")) return "ic-blue";
  if (c.includes("dark")) return "ic-darkred";
  return "ic-red";
}

function dayItems(date) {
  const items = [];
  visibleRows(DATA.ohjelma).forEach(r => {
    const d = normDate(pick(r,["date","paivamaara"]));
    if (d !== date) return;
    const time = normalizeTime(pick(r,["time","aika"]));
    const endTime = normalizeTime(pick(r,["end_time","loppuaika"]));
    const placeId = pick(r,["place_id","paikka_id"]);
    const desc = pick(r,["description","kuvaus","lisatiedot"]);
    items.push({
      source:"ohjelma", date:d, time, endTime, icon: pick(r,["icon","ikoni"],"ℹ️"),
      color: colorClass(pick(r,["color","vari"],"red")), accent: isTrue(pick(r,["accent","korostus"],"false")),
      title: pick(r,["title","otsikko"],"Ohjelma"),
      sub: [placeText(placeId), esc(desc)].filter(Boolean).join("<br>")
    });
  });
  visibleRows(DATA.ruokailut).forEach(r => {
    const d = normDate(pick(r,["date","paivamaara"]));
    if (d !== date) return;
    const time = normalizeTime(pick(r,["start_time","alkuaika"]));
    const endTime = normalizeTime(pick(r,["end_time","loppuaika"]));
    const displayTime = pick(r,["time","aika"]);
    const placeId = pick(r,["place_id","paikka_id"]);
    const menu = pick(r,["menu","ruokalista"]);
    const notes = pick(r,["notes","lisatiedot"]);
    items.push({
      source:"ruokailu", date:d, time, endTime, icon: pick(r,["icon","ikoni"],"🍴"), color:"ic-green",
      title: pick(r,["meal","ateria"],"Ruokailu"),
      sub: [`${esc(displayTime)}`, placeText(placeId), esc(menu), esc(notes)].filter(Boolean).join("<br>")
    });
  });
  visibleRows(DATA.ottelut).forEach(r => {
    const parsed = parseDateTime(pick(r,["paivamaara","date"]));
    if (parsed.date !== date) return;
    const time = parsed.time || normalizeTime(pick(r,["time","aika"]));
    const endTime = normalizeTime(pick(r,["end_time","loppuaika"])) || endDefault(time, 75);
    const home = pick(r,["kotijoukkue","home_team"]);
    const away = pick(r,["vierasjoukkue","away_team"]);
    const result = pick(r,["tulos","result"]);
    const stadium = pick(r,["stadion","stadium"]);
    const address = pick(r,["osoite","address"]);
    const notes = pick(r,["lisatiedot","notes"]);
    const match = [home, away].filter(Boolean).join(" – ") || "Ottelu";
    const subParts = [];
    if (result) subParts.push("Tulos: " + esc(result));
    if (stadium || address) subParts.push(mapLink(stadium || address, [stadium, address].filter(Boolean).join(", ")));
    if (notes) subParts.push(esc(notes));
    items.push({ source:"ottelu", date:parsed.date, time, endTime, icon:"⚾", color:"ic-red", accent:true, title:match, sub:subParts.join("<br>") });
  });
  visibleRows(DATA.kyydit).forEach(r => {
    const d = normDate(pick(r,["date","paivamaara"]));
    if (d !== date) return;
    const time = normalizeTime(pick(r,["departure_time","lahtoaika","time"]));
    const fromId = pick(r,["from_place_id","mista_place_id"]);
    const toId = pick(r,["to_place_id","minne_place_id"]);
    const fromText = pick(r,["from_text","mista"]);
    const toText = pick(r,["to_text","minne"]);
    const driver = pick(r,["driver","kuljettaja"]);
    const passengers = pick(r,["passengers","matkustajat"]);
    const seats = pick(r,["seats","paikkoja"]);
    const notes = pick(r,["notes","lisatiedot"]);
    const title = pick(r,["reason","syy"],"Kyyti / siirtymä");
    const sub = [
      "Lähtö: " + (fromId ? placeText(fromId, fromText) : esc(fromText || "Tarkentuu")),
      "Määränpää: " + (toId ? placeText(toId, toText) : esc(toText || "Tarkentuu")),
      driver ? "Kuljettaja: " + esc(driver) : "Kuljettaja: avoin / tarkentuu",
      passengers ? "Matkustajat: " + esc(passengers) : "",
      seats ? "Paikkoja: " + esc(seats) : "",
      notes ? esc(notes) : ""
    ].filter(Boolean).join("<br>");
    items.push({ source:"kyyti", date:d, time, endTime:endDefault(time, 30), icon:"🚗", color:"ic-blue", title, sub });
  });
  return items.sort((a,b) => (toMin(a.time) ?? 9999) - (toMin(b.time) ?? 9999));
}

function renderTabs() {
  const dayCont = document.getElementById("dayTabs");
  const infoCont = document.getElementById("infoTabs");
  const cur = getCurrentTab();
  const tk = todayKey();
  dayCont.innerHTML = "";
  infoCont.innerHTML = "";
  DAYS.forEach((d, i) => {
    const b = document.createElement("button");
    b.className = "day-tab" + (i === cur ? " active" : "");
    b.innerHTML = `<span class="tab-weekday">${d.label}${d.key === tk ? '<span class="today-dot"></span>' : ''}</span><span class="tab-date">${d.dateLabel}</span>`;
    b.onclick = () => { selectedTab = i; render(); };
    dayCont.appendChild(b);
  });
  [
    [INFO_TAB_IDS.talkoot, "🙋 Talkoot"], [INFO_TAB_IDS.kyydit, "🚗 Kyydit"], [INFO_TAB_IDS.ruoka, "🍴 Ruoka"],
    [INFO_TAB_IDS.osoitteet, "📍 Osoitteet"], [INFO_TAB_IDS.yhteystiedot, "📞 Yhteystiedot"], [INFO_TAB_IDS.info, "ℹ️ Info"],
    [INFO_TAB_IDS.saa, "🌤️ Sää"]
  ].forEach(([id,label]) => {
    const b = document.createElement("button");
    b.className = "info-tab" + (cur === id ? " active" : "");
    b.innerHTML = label;
    b.onclick = () => { selectedTab = id; render(); };
    infoCont.appendChild(b);
  });
}

function renderEvents() {
  const tab = getCurrentTab();
  if (tab === INFO_TAB_IDS.talkoot) return renderTalkootTab();
  if (tab === INFO_TAB_IDS.kyydit) return renderKyyditTab();
  if (tab === INFO_TAB_IDS.ruoka) return renderRuokaTab();
  if (tab === INFO_TAB_IDS.osoitteet) return renderOsoitteetTab();
  if (tab === INFO_TAB_IDS.yhteystiedot) return renderYhteystiedotTab();
  if (tab === INFO_TAB_IDS.info) return renderInfoTab();
  if (tab === INFO_TAB_IDS.saa) return renderWeatherTab();
  return renderDayTab();
}

function renderDayTab() {
  const day = DAYS[getCurrentTab()] || DAYS[0];
  const list = document.getElementById("eventList");
  const items = dayItems(day.key);
  const next = items.find(it => statusFor(it.date, it.time, it.endTime) === "future");
  renderNext(next);
  let html = loadErrorsHtml();
  if (!items.length) html += `<p class="small-note">Tälle päivälle ei ole vielä tietoja Google Sheetsissä.</p>`;
  for (const it of items) html += eventHtml(it, statusFor(it.date, it.time, it.endTime));
  list.innerHTML = html;
}
function renderNext(it) {
  const banner = document.getElementById("nextBanner");
  if (!it || it.date !== todayKey()) { banner.classList.remove("visible"); return; }
  document.getElementById("nbTitle").textContent = (it.time ? it.time + " — " : "") + it.title;
  document.getElementById("nbSub").innerHTML = it.sub || "";
  const mins = toMin(it.time) - minutesNow();
  const h = Math.floor(mins/60), m = mins % 60;
  document.getElementById("nbCountdown").textContent = mins <= 0 ? "Alkaa nyt!" : h > 0 ? `Alkaa ${h} h ${m} min kuluttua` : `Alkaa ${m} min kuluttua`;
  banner.classList.add("visible");
}
function eventHtml(it, status="") {
  return `<div class="event ${status}">
    <div class="ev-icon ${it.color}">${esc(it.icon || "ℹ️")}</div>
    <div class="ev-body">
      ${it.time ? `<div class="ev-time">${esc(it.time)}${it.endTime ? `–${esc(it.endTime)}` : ""}</div>` : ""}
      <div class="ev-title ${it.accent ? "accent" : ""}">${esc(it.title)}<span class="badge-now">Nyt</span></div>
      ${it.sub ? `<div class="ev-sub">${it.sub}</div>` : ""}
    </div>
  </div>`;
}
function loadErrorsHtml() {
  if (!loadErrors.length) return "";
  return `<div class="error-box"><strong>Huom:</strong> kaikkia Google Sheets -välilehtiä ei saatu ladattua.<br>${esc(loadErrors.join(" | "))}</div>`;
}

function renderRuokaTab() {
  hideNext();
  const list = document.getElementById("eventList");

  const rows = visibleRows(DATA.ruokailut).sort((a,b) => (normDate(pick(a,["date","paivamaara"])) + pick(a,["start_time","alkuaika","time"])).localeCompare(normDate(pick(b,["date","paivamaara"])) + pick(b,["start_time","alkuaika","time"])));
  let last = "";
  for (const r of rows) {
    const d = normDate(pick(r,["date","paivamaara"]));

    const time = normalizeTime(pick(r,["start_time","alkuaika"]));

    html += eventHtml({ time, endTime, icon:pick(r,["icon","ikoni"],"🍴"), color:"ic-green", title:pick(r,["meal","ateria"],"Ruokailu"), sub:[esc(pick(r,["time","aika"])), placeText(pick(r,["place_id","paikka_id"])), esc(pick(r,["menu","ruokalista"])), esc(pick(r,["notes","lisatiedot"]))].filter(Boolean).join("<br>") });
  }
  list.innerHTML = html || `<p class="small-note">Ruokailutietoja ei vielä ole.</p>`;
}

  visibleRows(DATA.info).forEach(r => {
    html += eventHtml({ icon:pick(r,["icon","ikoni"],"ℹ️"), color:"ic-blue", title:pick(r,["title","otsikko"],"Info"), sub:esc(pick(r,["text","teksti","description","kuvaus"])) });
  });

async function fetchWeather() {
  const lat = parseNumberFi(SETTINGS.weather_lat, 64.913);
  const lon = parseNumberFi(SETTINGS.weather_lon, 25.503);
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m&wind_speed_unit=ms&timezone=Europe%2FHelsinki&forecast_days=16`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    weatherData = await res.json(); weatherData._fetched = new Date(); weatherError = "";
    if (getCurrentTab() === INFO_TAB_IDS.saa) renderEvents();
  } catch (e) { weatherData = null; weatherError = e && e.message ? e.message : String(e); if (getCurrentTab() === INFO_TAB_IDS.saa) renderEvents(); }
}
function renderWeatherTab() {
  hideNext();
  const list = document.getElementById("eventList");
  let html = loadErrorsHtml();
  if (!weatherData || !weatherData.hourly) { list.innerHTML = html + `<p class="small-note" style="text-align:center;margin-top:20px;">Sääennustetta haetaan… Jos viesti ei katoa, sääpalveluun ei saada yhteyttä tai selain estää haun.<br><br><strong>Käytetyt koordinaatit:</strong> ${esc(String(parseNumberFi(SETTINGS.weather_lat, 64.913)))} / ${esc(String(parseNumberFi(SETTINGS.weather_lon, 25.503)))}${weatherError ? `<br><strong>Virhe:</strong> ${esc(weatherError)}` : ""}</p>`; return; }
  const H = weatherData.hourly, tk = todayKey(), nowH = nowFi().getHours(), showHours = [0,3,6,9,12,15,18,21], byDay = {};
  H.time.forEach((t,i) => {
    const [date, hm] = t.split("T"), hour = parseInt(hm.slice(0,2),10);
    if (!showHours.includes(hour)) return;
    if (date === tk && hour < nowH - 2) return;
    if (date < tk) return;
    (byDay[date] ||= []).push({ hour, temp:Math.round(H.temperature_2m[i]), code:H.weather_code[i], rain:H.precipitation_probability[i], wind:Math.round(H.wind_speed_10m[i]) });
  });
  const f = weatherData._fetched;
  html += `<p class="small-note">Sääennuste · ${esc(SETTINGS.weather_location || SETTINGS.weather_place || "Kempele")} — päivitetty ${String(f.getHours()).padStart(2,"0")}:${String(f.getMinutes()).padStart(2,"0")} (Open-Meteo)</p>`;
  Object.keys(byDay).sort().forEach(date => {
    const isCamp = DAYS.some(d => d.key === date), d = new Date(date + "T12:00:00");
    html += `<div style="background:var(--card);border:${isCamp ? "2px solid var(--red)" : "1px solid var(--border)"};border-radius:12px;padding:10px 0 6px;margin-bottom:10px;"><div style="font-size:14px;font-weight:700;color:var(--text);padding:0 14px 6px;">${WD[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}. ${date === todayKey() ? '<span class="tag">Tänään</span>' : ''} ${isCamp ? '<span class="tag" style="background:var(--red);">⚾ Leiripäivä</span>' : ''}</div><div style="display:flex;overflow-x:auto;gap:2px;padding:0 8px;-webkit-overflow-scrolling:touch;">`;
    byDay[date].forEach(h => { const [emoji] = WMO[h.code] || ["🌡️","Sää"]; html += `<div style="min-width:56px;text-align:center;padding:4px 2px;"><div style="font-size:11px;font-weight:700;color:var(--sub);">${String(h.hour).padStart(2,"0")}</div><div style="font-size:22px;line-height:1.3;">${emoji}</div><div style="font-size:14px;font-weight:700;color:var(--red);">${h.temp}°</div><div style="font-size:10.5px;color:#2B5FA8;">💧 ${h.rain}%</div><div style="font-size:10.5px;color:var(--sub);">${h.wind} m/s</div></div>`; });
    html += `</div></div>`;
  });
  list.innerHTML = html;
}

function formatDate(date) { const d = new Date(date + "T12:00:00"); return `${WD[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.`; }
function cap(s) { s = String(s || ""); return s.charAt(0).toUpperCase() + s.slice(1).replace(/_/g," "); }
function hideNext() { document.getElementById("nextBanner").classList.remove("visible"); }
function renderClock() {
  const n = nowFi();
  document.getElementById("clock").textContent = `${["su","ma","ti","ke","to","pe","la"][n.getDay()]} ${n.getDate()}.${n.getMonth()+1}. klo ${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}
function render() { renderTabs(); renderEvents(); renderClock(); }

async function init() {
  renderClock();
  try {
    DATA = await loadAllData();
    buildSettings(); buildPlaces(); buildDays();
    selectedTab = getAutoDayIndex();
    render();
    fetchWeather();
  } catch (err) {
    document.getElementById("eventList").innerHTML = `<div class="error-box"><strong>Tietojen lataus epäonnistui.</strong><br>${esc(err.message)}<br>Päivitä sivu hetken kuluttua.</div>`;
  }
}
init();
setInterval(renderClock, 1000);
setInterval(fetchWeather, 60 * 60 * 1000);
setInterval(() => { if (typeof getCurrentTab() === "number") render(); else renderClock(); }, 30000);
</script>
