function parseCsv(text) {
  text = text.replace(/^\uFEFF/, "");
  const rows = []; let row = [], cell = "", inQuotes = false;
  for (let i=0; i<text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQuotes) { if (c === '"' && n === '"') { cell += '"'; i++; } else if (c === '"') inQuotes = false; else cell += c; }
    else if (c === '"') inQuotes = true;
    else if (c === ',') { row.push(cell); cell = ""; }
    else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
    else if (c !== '\r') cell += c;
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows.shift().map(normKey);
  return rows.filter(r => r.some(v => String(v || "").trim())).map(r => Object.fromEntries(headers.map((h,i) => [h, String(r[i] || "").trim()])));
}
async function loadCsv(name, url) {
  const sep = url.includes("?") ? "&" : "?";
  const res = await fetch(url + sep + "cachebust=" + Date.now(), { cache:"no-store" });
  if (!res.ok) throw new Error(name + ": HTTP " + res.status);
  return parseCsv(await res.text());
}
async function loadAllData() {
  loadErrors = [];

    try { asetuksetRows = await loadCsv("asetukset", urls.asetukset); }

  const tmpSettings = Object.fromEntries(asetuksetRows.map(r => [pick(r,["key","avain"]), pick(r,["value","arvo"])]).filter(([k]) => k));
  Object.keys(urls).forEach(name => {
    urls[name] = urls[name] || tmpSettings[`${name}_csv_url`] || tmpSettings[`csv_${name}`] || tmpSettings[`data_source_${name}`] || "";
  });
  const entries = await Promise.all(Object.entries(urls).filter(([name]) => name !== "asetukset").map(async ([name,url]) => {
    try {
      if (!url) return [name, []];

    catch (err) { loadErrors.push(err.message); return [name, []]; }
  }));

}
function normDate(v) {
  v = String(v || "").trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m = v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  return m ? `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}` : "";
}
function normalizeTime(v) { const m = String(v || "").trim().replace(".", ":").match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2,"0")}:${m[2]}` : ""; }
function parseDateTime(v) {
  v = String(v || "").trim();
  let m = v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})\s+(\d{1,2}):(\d{2})/);
  if (m) return { date:`${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`, time:`${m[4].padStart(2,"0")}:${m[5]}` };
  m = v.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{1,2}:\d{2})/);
  if (m) return { date:m[1], time:normalizeTime(m[2]) };
  return { date:normDate(v), time:"" };
}
const toMin = hhmm => { const m = String(hhmm || "").match(/^(\d{1,2}):(\d{2})/); return m ? Number(m[1])*60 + Number(m[2]) : null; };
const endDefault = (time, minutes=60) => { const m = toMin(time); if (m === null) return ""; const e = m + minutes; return `${String(Math.floor(e/60)%24).padStart(2,"0")}:${String(e%60).padStart(2,"0")}`; };

function idKey(v) { return String(v || "").trim().toLowerCase(); }
function isOwnTeamName(name) { const n = String(name || "").toLowerCase(); const team = String(SETTINGS.team_match_name || SETTINGS.team_name || "Manse PP").toLowerCase(); return [team,"manse pp","manse pp, tampere"].filter(Boolean).some(c => n.includes(c)); }
function splitMatchText(txt) { const p = String(txt || "").trim().split(/\s+[–—-]\s+/); return p.length >= 2 ? [p[0].trim(), p.slice(1).join(" - ").trim()] : ["", ""]; }
function syntheticMatchId(date, time, matchText) { return [date, String(time||"").replace(/:/g,""), roleKey(matchText).slice(0,48)].filter(Boolean).join("-") || "ottelu"; }
function matchInfo(r) {

  const date = parsed.date || normDate(pick(r,["date","paivamaara"]));
  const time = parsed.time || normalizeTime(pick(r,["time","aika"]));

  const home = pick(r,["kotijoukkue","home_team"]) || mh; const away = pick(r,["vierasjoukkue","away_team"]) || ma;
  const match = [home, away].filter(Boolean).join(" – ") || rawMatch || "Ottelu";
  const explicitId = pick(r,["match_id","ottelu_id","id"]); const matchId = explicitId || syntheticMatchId(date, time, match);
  return { ...r, matchId, date, time, endTime, home, away, match, result:pick(r,["tulos","result"]), placeId:pick(r,["place_id","paikka_id"]), stadium:pick(r,["stadion","stadium"]), address:pick(r,["osoite","address"]), notes:pick(r,["lisatiedot","notes"]) };
}
function mealInfo(r) {

function routeKey(start, end) { start = idKey(start); end = idKey(end); return start && end ? `${start}|${end}` : ""; }

function routeByPlaces(start, end) { return IDX.routesByKey?.get(routeKey(start,end)) || null; }
function addWarn(msg) { if (msg && !dataWarnings.includes(msg)) dataWarnings.push(msg); }
function validateData() {
